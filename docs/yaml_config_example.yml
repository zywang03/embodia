# One embodia YAML file can hold both robot-side and policy-side config.
# `RobotMixin.from_yaml(...)` automatically reads the top-level `robot:` block.
# `PolicyMixin.from_yaml(...)` automatically reads the top-level `policy:` block.
# This file only describes the shared runtime schema plus method aliases.
# `schema.task` is optional policy-side context. Robot specs do not declare it.
# Any value prefixed with `YOUR_OWN_` is a placeholder you are expected to replace.
# Numeric runtime payloads that match this schema are numpy arrays:
# `frame.images[*]`, `frame.state[*]`, and `action.commands[*].value`.

schema:
  images:
    - YOUR_OWN_front_rgb
  task:
    - YOUR_OWN_prompt
  components:
    YOUR_OWN_arm:
      type: arm
      dof: 6
      command:
        - cartesian_pose_delta
    YOUR_OWN_gripper:
      type: gripper
      dof: 1
      command:
        - gripper_position

robot:
  name: YOUR_OWN_robot
  method_aliases:
    observe: YOUR_OWN_get_obs
    act: YOUR_OWN_send_action
    reset: YOUR_OWN_reset

policy:
  name: YOUR_OWN_policy
  method_aliases:
    reset: YOUR_OWN_clear_state
    infer: YOUR_OWN_infer
