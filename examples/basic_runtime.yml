robot:
  interface:
    name: vendor_robot
    images:
      front_rgb: rgb_front
    groups:
      arm:
        kind: arm
        dof: 6
        state:
          joint_positions: qpos
        action_modes:
          ee_delta: cartesian_delta
      gripper:
        kind: gripper
        dof: 1
        state:
          position: gripper_pos
        action_modes:
          scalar_position: gripper_position
  method_aliases:
    observe: capture
    act: send_command
    reset: home

model:
  interface:
    name: vendor_model
    images:
      front_rgb: rgb_front
    state:
      joint_positions: qpos
      position: gripper_pos
    outputs:
      arm:
        mode: ee_delta
        dim: 6
        native_mode: cartesian_delta
      gripper:
        mode: scalar_position
        dim: 1
        native_mode: gripper_position
  method_aliases:
    reset: clear_state
    step: infer
