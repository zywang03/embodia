# One embodia YAML file can hold both robot-side and model-side config.
# `RobotMixin.from_yaml(...)` automatically reads the top-level `robot:` block.
# `ModelMixin.from_yaml(...)` automatically reads the top-level `model:` block.
# This file only describes the shared runtime schema plus method aliases.

schema:
  images:
    - front_rgb
  task:
    - prompt
  components:
    arm:
      kind: arm
      dof: 6
      state:
        - joint_positions
        - ee_pose
      command_kinds:
        - cartesian_pose_delta
    gripper:
      kind: gripper
      dof: 1
      state:
        - position
      command_kinds:
        - gripper_position

robot:
  name: your_robot
  method_aliases:
    observe: capture
    act: send_command
    reset: home

model:
  name: your_model
  method_aliases:
    reset: clear_state
    infer: predict_action
