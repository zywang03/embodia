schema:
  images:
    - front_rgb
  groups:
    arm:
      kind: arm
      dof: 6
      state:
        - joint_positions
      command_kinds:
        - cartesian_pose_delta
    gripper:
      kind: gripper
      dof: 1
      state:
        - position
      command_kinds:
        - gripper_position

robot:
  name: vendor_robot
  method_aliases:
    observe: capture
    act: send_command
    reset: home

model:
  name: vendor_model
  requires:
    images:
      - front_rgb
    state:
      - joint_positions
      - position
  outputs:
    arm: cartesian_pose_delta
    gripper: gripper_position
  method_aliases:
    reset: clear_state
    step: infer
