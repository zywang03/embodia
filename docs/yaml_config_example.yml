# One embodia YAML file can hold both robot-side and model-side config.
# `RobotMixin.from_yaml(...)` automatically reads the top-level `robot:` block,
# and `ModelMixin.from_yaml(...)` automatically reads the top-level `model:` block.

robot:
  # These keys are forwarded into YourRobot(...)
  init:
    prompt: pick up the cloth and fold it

  # Compact YAML shape: embodia-standard name -> your native name.
  # embodia turns this into spec + remapping tables internally.
  interface:
    name: your_robot
    images:
      front_rgb: rgb_front
    state:
      joint_positions: qpos
      ee_pose: tcp_pose
    action_modes:
      ee_delta: cartesian_delta

  # embodia method name -> your existing method name
  method_aliases:
    observe: capture
    act: send_command
    reset: home

  # Remote policy config can also live here, but Python callables such as
  # `obs_builder` still need to be passed from code.
  #
  # remote_policy:
  #   enabled: true
  #   host: localhost
  #   port: 8000
  #   action_mode: joint_position
  #   dt: 0.1

model:
  # These keys are forwarded into YourModel(...)
  init:
    default_prompt: fold the cloth

  # Same compact shape on the model side.
  interface:
    name: your_model
    images:
      front_rgb: rgb_front
    state:
      joint_positions: qpos
    action_modes:
      ee_delta: cartesian_delta
    output_action_mode: ee_delta

  # embodia method name -> your existing method name
  method_aliases:
    reset: clear_state
    step: infer
