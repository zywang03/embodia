robot:
  robot_spec:
    name: vendor_robot
    action_modes:
      - cartesian_delta
    image_keys:
      - rgb_front
    state_keys:
      - qpos
  method_aliases:
    observe: capture
    act: send_command
    reset: home
  modality_maps:
    images:
      rgb_front: front_rgb
    state:
      qpos: joint_positions
    action_modes:
      cartesian_delta: ee_delta

model:
  model_spec:
    name: vendor_model
    required_image_keys:
      - rgb_front
    required_state_keys:
      - qpos
    output_action_mode: cartesian_delta
  method_aliases:
    reset: clear_state
    step: infer
  modality_maps:
    images:
      rgb_front: front_rgb
    state:
      qpos: joint_positions
    action_modes:
      cartesian_delta: ee_delta
