schema:
  images:
    - YOUR_OWN_front_rgb
  components:
    YOUR_OWN_arm:
      type: arm
      dof: 6
      command:
        - cartesian_pose_delta
    YOUR_OWN_gripper:
      type: gripper
      dof: 1
      command:
        - gripper_position

robot:
  name: YOUR_OWN_robot
  method_aliases:
    observe: YOUR_OWN_get_obs
    act: YOUR_OWN_send_action
    reset: YOUR_OWN_reset

policy:
  name: YOUR_OWN_policy
  method_aliases:
    reset: YOUR_OWN_clear_state
    infer: YOUR_OWN_infer
