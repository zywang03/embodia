# One embodia YAML file can hold both robot-side and policy-side config.
# `RobotMixin.from_yaml(...)` automatically reads the top-level `robot:` block.
# `PolicyMixin.from_yaml(...)` automatically reads the top-level `policy:` block.
# This file only describes the shared runtime schema plus method aliases.
# `schema.task` is optional policy-side context. Robot specs do not declare it.

schema:
  images:
    - front_rgb
  task:
    - prompt
  components:
    arm:
      kind: arm
      dof: 6
      state:
        - joint_positions
        - ee_pose
      command_kinds:
        - cartesian_pose_delta
    gripper:
      kind: gripper
      dof: 1
      state:
        - position
      command_kinds:
        - gripper_position

robot:
  name: your_robot
  method_aliases:
    observe: capture
    act: send_command
    reset: home

policy:
  name: your_model
  method_aliases:
    reset: clear_state
    infer: predict_action
