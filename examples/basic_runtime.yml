schema:
  images:
    - front_rgb
  components:
    arm:
      kind: arm
      dof: 6
      state:
        - joint_positions
      command_kinds:
        - cartesian_pose_delta
    gripper:
      kind: gripper
      dof: 1
      state:
        - position
      command_kinds:
        - gripper_position

robot:
  name: vendor_robot
  method_aliases:
    observe: capture
    act: send_command
    reset: home

policy:
  name: vendor_model
  method_aliases:
    reset: clear_state
    infer: infer
